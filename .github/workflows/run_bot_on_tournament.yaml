name: Forecast on Tournaments (Summer FutureEval + minibench)

on:
  workflow_dispatch:
    inputs:
      tournament:
        description: "Single tournament to run (leave empty for Summer FutureEval + minibench)"
        required: false
        default: ""
        type: string
      researcher:
        description: "Research strategy/model (e.g. no_research, smart-searcher/kiconnect)"
        required: false
        default: "smart-searcher/kiconnect"
        type: string
      default_model:
        description: "Override forecast LLM model (Litellm format). Leave empty to use tiered env defaults."
        required: false
        default: ""
        type: string
      parser_model:
        description: "Override parser/router LLM model (Litellm format). Leave empty to use tiered env defaults."
        required: false
        default: ""
        type: string
      smart_searcher_num_searches:
        description: "SmartSearcher: number of searches to run"
        required: false
        default: "3"
        type: string
      smart_searcher_num_sites_per_search:
        description: "SmartSearcher: sites per search"
        required: false
        default: "8"
        type: string
      smart_searcher_use_advanced_filters:
        description: "SmartSearcher: advanced filters (true/false)"
        required: false
        default: "false"
        type: string
  schedule:
    - cron: "*/30 * * * *" # every 30 minutes

# Add concurrency group to prevent parallel runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Daily job to run the simple forecast bot
jobs:
  forecast_job:
    runs-on: ubuntu-latest # determines the machine that will run the job - keep as is
    timeout-minutes: 120
    environment: "metaculus bot"
    steps: # sets up the steps that will be run in order
      # setup repository with all necessary dependencies - keep as is
      - name: Check out repository
        uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Install poetry
        uses: snok/install-poetry@v1
        with:
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true
      # Adding the below will make the workflow faster, but will mean you don't automatically get updates from forecasting-tools and other packages
      # - name: Load cached venv
      #   id: cached-poetry-dependencies
      #   uses: actions/cache@v4
      #   with:
      #     path: .venv
      #     key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('**/poetry.lock') }}
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ms-playwright-${{ runner.os }}-${{ hashFiles('poetry.lock') }}
      - name: Install dependencies
        timeout-minutes: 5
        run: poetry install --no-interaction --no-root --with web
      - name: Install Playwright Chromium (with deps)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        timeout-minutes: 5
        run: poetry run playwright install --with-deps chromium
      - name: Ensure Playwright Chromium present
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        timeout-minutes: 2
        run: poetry run playwright install chromium
      - name: Run bot
        timeout-minutes: 100
        run: |
          MANUAL_TOURNAMENT="${{ github.event.inputs.tournament }}"
          RESEARCHER="${{ github.event.inputs.researcher }}"
          DEFAULT_MODEL="${{ github.event.inputs.default_model }}"
          PARSER_MODEL="${{ github.event.inputs.parser_model }}"
          SMART_SEARCHER_NUM_SEARCHES="${{ github.event.inputs.smart_searcher_num_searches }}"
          SMART_SEARCHER_NUM_SITES_PER_SEARCH="${{ github.event.inputs.smart_searcher_num_sites_per_search }}"
          SMART_SEARCHER_USE_ADVANCED_FILTERS="${{ github.event.inputs.smart_searcher_use_advanced_filters }}"

          if [ -z "$RESEARCHER" ]; then RESEARCHER="smart-searcher/kiconnect"; fi
          if [ -z "$SMART_SEARCHER_NUM_SEARCHES" ]; then SMART_SEARCHER_NUM_SEARCHES="3"; fi
          if [ -z "$SMART_SEARCHER_NUM_SITES_PER_SEARCH" ]; then SMART_SEARCHER_NUM_SITES_PER_SEARCH="8"; fi
          if [ -z "$SMART_SEARCHER_USE_ADVANCED_FILTERS" ]; then SMART_SEARCHER_USE_ADVANCED_FILTERS="false"; fi

          export SMART_SEARCHER_NUM_SEARCHES
          export SMART_SEARCHER_NUM_SITES_PER_SEARCH
          export SMART_SEARCHER_USE_ADVANCED_FILTERS
          TOURNAMENT_TIMEOUT_MINUTES="${BOT_TOURNAMENT_TIMEOUT_MINUTES:-90}"

          # Build tournament list
          # If manual input provided, only run that tournament
          if [ -n "$MANUAL_TOURNAMENT" ]; then
            TOURNAMENTS=("$MANUAL_TOURNAMENT")
          else
            TOURNAMENTS=(
              "${BOT_TOURNAMENT:-summer-futureeval-2026}"
              "https://www.metaculus.com/tournament/minibench/"
            )
          fi

          echo "Tournaments to process: ${TOURNAMENTS[*]}"

          ARGS=(main.py --mode tournament --researcher "$RESEARCHER" --submit)
          for TOURNAMENT in "${TOURNAMENTS[@]}"; do
            ARGS+=(--tournament "$TOURNAMENT")
          done
          if [ -n "$DEFAULT_MODEL" ]; then ARGS+=(--default-model "$DEFAULT_MODEL"); fi
          if [ -n "$PARSER_MODEL" ]; then ARGS+=(--parser-model "$PARSER_MODEL"); fi

          echo "Tournaments to process in one scan: ${TOURNAMENTS[*]}"
          EXIT_CODE=0
          timeout --signal=TERM --kill-after=2m "${TOURNAMENT_TIMEOUT_MINUTES}m" poetry run python "${ARGS[@]}" || EXIT_CODE=$?
          if [ "$EXIT_CODE" -eq 124 ]; then
            echo "::warning::Timed out after ${TOURNAMENT_TIMEOUT_MINUTES}m for combined tournament run; treating this scheduled run as partially complete."
            exit 0
          elif [ "$EXIT_CODE" -ne 0 ]; then
            echo "::error::Combined tournament run failed (exit code $EXIT_CODE)"
          fi
          exit "$EXIT_CODE"
        # this reads the environment variables from the github repository.
        # Store under Settings --> Secrets and variables --> Actions
        env:
          METACULUS_TOKEN: ${{ secrets.METACULUS_TOKEN }} # replace this with the name of the variable under which you stored your own Metaculus token
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ vars.AZURE_OPENAI_ENDPOINT || secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT: ${{ vars.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_API_VERSION: ${{ vars.AZURE_OPENAI_API_VERSION }}
          AZURE_OPENAI_API_MODE: ${{ vars.AZURE_OPENAI_API_MODE }}
          BOT_TOURNAMENT: ${{ vars.BOT_TOURNAMENT }}
          KICONNECT_API_URL: ${{ secrets.KICONNECT_API_URL }}
          KICONNECT_API_KEY: ${{ secrets.KICONNECT_API_KEY }}
          KICONNECT_MODEL: ${{ vars.KICONNECT_MODEL }}
          KICONNECT_FORECAST_MODEL: ${{ vars.KICONNECT_FORECAST_MODEL }}
          KICONNECT_CHEAP_MODEL: ${{ vars.KICONNECT_CHEAP_MODEL }}
          KICONNECT_HIGH_MODEL: ${{ vars.KICONNECT_HIGH_MODEL }}
          KICONNECT_CHEAP_MODEL_FALLBACKS: ${{ vars.KICONNECT_CHEAP_MODEL_FALLBACKS }}
          KICONNECT_FORECAST_MODEL_FALLBACKS: ${{ vars.KICONNECT_FORECAST_MODEL_FALLBACKS }}
          KICONNECT_HIGH_MODEL_FALLBACKS: ${{ vars.KICONNECT_HIGH_MODEL_FALLBACKS }}
          KICONNECT_MODEL_FALLBACKS: ${{ vars.KICONNECT_MODEL_FALLBACKS }}
          BOT_FORECAST_MODEL: ${{ vars.BOT_FORECAST_MODEL }}
          BOT_CHEAP_MODEL: ${{ vars.BOT_CHEAP_MODEL }}
          BOT_HIGH_VALUE_MODEL: ${{ vars.BOT_HIGH_VALUE_MODEL }}
          BOT_PARSER_MODEL: ${{ vars.BOT_PARSER_MODEL }}
          BOT_ROUTER_MODEL: ${{ vars.BOT_ROUTER_MODEL }}
          BOT_SUMMARIZER_MODEL: ${{ vars.BOT_SUMMARIZER_MODEL }}
          BOT_RESEARCH_MODEL: ${{ vars.BOT_RESEARCH_MODEL }}
          BOT_FORECAST_REASONING_EFFORT: ${{ vars.BOT_FORECAST_REASONING_EFFORT }}
          BOT_RESEARCH_REASONING_EFFORT: ${{ vars.BOT_RESEARCH_REASONING_EFFORT }}
          BOT_CHEAP_REASONING_EFFORT: ${{ vars.BOT_CHEAP_REASONING_EFFORT }}
          BOT_HIGH_VALUE_REASONING_EFFORT: ${{ vars.BOT_HIGH_VALUE_REASONING_EFFORT }}
          BOT_HIGH_VALUE_FORECAST_MODE: ${{ vars.BOT_HIGH_VALUE_FORECAST_MODE }}
          # KIconnect TLS:
          # Prefer fixing the server certificate chain (fullchain / intermediate CA).
          # If you still see SSL/certificate errors, set SSL_VERIFY to a CA bundle path
          # (or as a last resort, SSL_VERIFY="false" which disables verification).
          BOT_REQUIRE_KICONNECT: "true"
          BOT_ENABLE_FALLBACK: ${{ vars.BOT_ENABLE_FALLBACK || 'true' }}
          BOT_FALLBACK_MODEL: ${{ vars.BOT_FALLBACK_MODEL || 'openrouter/openai/gpt-oss-120b:free' }}
          BOT_MAX_CONCURRENT_QUESTIONS: "2"
          BOT_MAX_CONCURRENT_TASKS: "1"
          MATRIX_HOMESERVER: ${{ secrets.MATRIX_HOMESERVER }}
          MATRIX_ACCESS_TOKEN: ${{ secrets.MATRIX_ACCESS_TOKEN }}
          MATRIX_ROOM_ID: ${{ secrets.MATRIX_ROOM_ID }}
          MATRIX_NOTIFY_ALWAYS: "false"
          SEC_USER_AGENT: ${{ vars.SEC_USER_AGENT || secrets.SEC_USER_AGENT }}
          BOT_ENABLE_LOCAL_QUESTION_CRAWL: "true"
          BOT_TOURNAMENT_TIMEOUT_MINUTES: ${{ vars.BOT_TOURNAMENT_TIMEOUT_MINUTES }}
